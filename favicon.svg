<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- KIMI GROK FPS — OGP同系ボクセルレティクル -->
  <!-- 背景: Desert / Jungle の微差 -->
  <rect width="16" height="32" fill="#14120c"/>
  <rect x="16" width="16" height="32" fill="#0e1410"/>
  <!-- 薄い外周 -->
  <rect x="1" y="1" width="30" height="1" fill="#2a271c"/>
  <rect x="1" y="30" width="30" height="1" fill="#2a271c"/>
  <rect x="1" y="1" width="1" height="30" fill="#2a271c"/>
  <rect x="30" y="1" width="1" height="30" fill="#2a271c"/>

  <!-- 外側アーム 上 -->
  <rect x="14" y="3" width="4" height="1" fill="#f2ead0"/>
  <rect x="14" y="4" width="4" height="3" fill="#e0c98e"/>
  <rect x="14" y="7" width="4" height="1" fill="#9a7a45"/>
  <!-- 下 -->
  <rect x="14" y="24" width="4" height="1" fill="#f2ead0"/>
  <rect x="14" y="25" width="4" height="3" fill="#e0c98e"/>
  <rect x="14" y="28" width="4" height="1" fill="#9a7a45"/>
  <!-- 左 -->
  <rect x="3" y="14" width="1" height="4" fill="#f2ead0"/>
  <rect x="4" y="14" width="3" height="4" fill="#e0c98e"/>
  <rect x="7" y="14" width="1" height="4" fill="#9a7a45"/>
  <!-- 右 -->
  <rect x="24" y="14" width="1" height="4" fill="#f2ead0"/>
  <rect x="25" y="14" width="3" height="4" fill="#e0c98e"/>
  <rect x="28" y="14" width="1" height="4" fill="#9a7a45"/>

  <!-- 角ブラケット（OGPレティクルの内側枠） -->
  <rect x="10" y="10" width="3" height="1" fill="#f2ead0"/>
  <rect x="10" y="10" width="1" height="3" fill="#f2ead0"/>
  <rect x="19" y="10" width="3" height="1" fill="#f2ead0"/>
  <rect x="21" y="10" width="1" height="3" fill="#f2ead0"/>
  <rect x="10" y="19" width="1" height="3" fill="#d8c08a"/>
  <rect x="10" y="21" width="3" height="1" fill="#d8c08a"/>
  <rect x="21" y="19" width="1" height="3" fill="#d8c08a"/>
  <rect x="19" y="21" width="3" height="1" fill="#d8c08a"/>

  <!-- チーム色コーナー（青 / 赤） -->
  <rect x="2" y="2" width="2" height="2" fill="#4a6d8c"/>
  <rect x="28" y="2" width="2" height="2" fill="#8c4a42"/>
  <rect x="2" y="28" width="2" height="2" fill="#4a6d8c"/>
  <rect x="28" y="28" width="2" height="2" fill="#8c4a42"/>

  <!-- 中央ドット -->
  <rect x="14" y="14" width="4" height="1" fill="#f7f0d8"/>
  <rect x="14" y="15" width="4" height="2" fill="#e0c98e"/>
  <rect x="14" y="17" width="4" height="1" fill="#9a7a45"/>
</svg>
