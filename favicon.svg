  <rect width="32" height="32" fill="#0b0c09"/>
  <!-- top arm: highlight / body / shade -->
  <rect x="13" y="4"  width="6" height="2" fill="#efe6c4"/>
  <rect x="13" y="6"  width="6" height="4" fill="#d8c08a"/>
  <rect x="13" y="10" width="6" height="2" fill="#9a7a45"/>
  <!-- bottom arm -->
  <rect x="13" y="20" width="6" height="2" fill="#efe6c4"/>
  <rect x="13" y="22" width="6" height="4" fill="#d8c08a"/>
  <rect x="13" y="26" width="6" height="2" fill="#9a7a45"/>
  <!-- left arm -->
  <rect x="4"  y="13" width="2" height="6" fill="#efe6c4"/>
  <rect x="6"  y="13" width="4" height="6" fill="#d8c08a"/>
  <rect x="10" y="13" width="2" height="6" fill="#9a7a45"/>
  <!-- right arm -->
  <rect x="20" y="13" width="2" height="6" fill="#efe6c4"/>
  <rect x="22" y="13" width="4" height="6" fill="#d8c08a"/>
  <rect x="26" y="13" width="2" height="6" fill="#9a7a45"/>
  <!-- center dot -->
  <rect x="14" y="14" width="4" height="1" fill="#efe6c4"/>
  <rect x="14" y="15" width="4" height="2" fill="#d8c08a"/>
  <rect x="14" y="17" width="4" height="1" fill="#9a7a45"/>
