# Cloudflare Workers Static Assets + Durable Object (Room)
# Deploy: ./scripts/prepare-cf-assets.sh && npx wrangler deploy
# URL: https://kimi-grok-fps.<account-subdomain>.workers.dev
# Local: ./scripts/prepare-cf-assets.sh && npx wrangler dev

name = "kimi-grok-fps"
main = "./worker/index.js"
compatibility_date = "2026-07-21"
workers_dev = true

[assets]
directory = "./.cf-assets"
binding = "ASSETS"
# /api/* だけ Worker 先回り（静的配信はそのままエッジ）
run_worker_first = ["/api/*"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
